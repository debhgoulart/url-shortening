services:
  postgres:
    image: postgres:18
    container_name: 'url-shortening'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: db_shortening
    ports:
      - '5404:5432'
    volumes:
      #- ${HOME:-${USERPROFILE}}/db/pgdata_url-sortening:/var/lib/postgresql
      - ./database/init:/docker-entrypoint-initdb.d
    restart: always